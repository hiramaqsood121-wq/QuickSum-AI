<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSum AI - Simple Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ QuickSum AI</h1>
        <p>Paste your long text below to get a 3-bullet summary.</p>
        
        <textarea id="inputText" placeholder="Paste your article or notes here..."></textarea>
        
        <button id="sumBtn">Summarize Text</button>

        <div id="resultContainer" class="hidden">
            <h3>Summary:</h3>
            <div id="outputText"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
